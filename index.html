<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bobo ｜ 我的模拟人生</title>
<meta name="description" content="模拟人生风格的个人主页" />

<!-- ============================================================
     📝 使用说明(部署到 GitHub Pages 前请阅读)
     1. 把这个文件重命名为 index.html
     2. 修改下方 <script id="site-config"> 里的内容(名字/简介/需求条/特质/愿望/人际关系)
     3. 把你自己的照片放进同一个仓库,并把占位图片地址换成你的照片路径
        (没有照片也没关系,默认会显示可爱的占位表情)
     4. 新建一个 GitHub 仓库,把文件传上去,在仓库设置里开启 GitHub Pages 即可
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #eef4ea;
    --bg-2: #e2ede0;
    --panel: #ffffff;
    --line: #d8e3d3;
    --ink: #2c3a2a;
    --ink-soft: #6b7a68;
    --plumbob: #5fc44d;
    --plumbob-deep: #3fa32e;
    --teal: #2fb3ad;
    --coral: #ff8a65;
    --gold: #ffc94d;
    --blue: #4d9bff;
    --purple: #a37bff;
    --need-good: #6bc44d;
    --need-mid: #ffc94d;
    --need-low: #ff5f5f;
    --font-display: 'Fredoka', 'Baloo 2', 'Noto Sans SC', sans-serif;
    --font-body: 'Noto Sans SC', sans-serif;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 0%, var(--bg-2) 0%, transparent 55%),
      radial-gradient(circle at 90% 20%, #fdf3df 0%, transparent 40%),
      var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.65;
    overflow-x: hidden;
  }

  main{ position: relative; z-index: 1; }
  .wrap{ max-width: 960px; margin: 0 auto; padding: 0 22px; }

  /* -------- 漂浮云朵装饰 -------- */
  .clouds{ position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .clouds span{
    position:absolute;
    opacity: .5;
    font-size: 30px;
    animation: floaty linear infinite;
  }
  @keyframes floaty{
    from{ transform: translateX(-10px); }
    to{ transform: translateX(10px); }
  }
  @media (prefers-reduced-motion: reduce){ .clouds span{ animation:none; } }

  /* ================= HERO ================= */
  .hero{
    padding: 90px 20px 50px;
    text-align: center;
  }

  /* 钻石光环 */
  .plumbob-wrap{
    height: 60px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    margin-bottom: -6px;
  }
  .plumbob{
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #8bff6e, var(--plumbob-deep));
    transform: rotate(45deg);
    box-shadow: 0 0 18px 2px rgba(95,196,77,.65), 0 6px 10px rgba(0,0,0,.15);
    animation: hover 1.8s ease-in-out infinite;
    border-radius: 4px;
  }
  @keyframes hover{
    0%,100%{ transform: rotate(45deg) translateY(0); }
    50%{ transform: rotate(45deg) translateY(-10px); }
  }

  .avatar-ring{
    width: 156px;
    height: 156px;
    margin: 14px auto 18px;
    border-radius: 50%;
    background: var(--panel);
    padding: 6px;
    box-shadow: 0 14px 30px -14px rgba(44,58,42,.35);
    position: relative;
  }
  .avatar-ring::after{
    content:"";
    position:absolute;
    inset: -5px;
    border-radius: 50%;
    border: 3px solid var(--plumbob);
    opacity: .9;
  }
  .avatar-ring .inner{
    width:100%; height:100%;
    border-radius: 50%;
    overflow:hidden;
    background: linear-gradient(150deg, #cdeec2, #a9d9ff);
    display:flex; align-items:center; justify-content:center;
    font-size: 60px;
  }
  .avatar-ring img{ width:100%; height:100%; object-fit:cover; display:block; }

  .name-plate{
    display:inline-block;
    background: var(--panel);
    padding: 10px 26px;
    border-radius: 999px;
    box-shadow: 0 10px 20px -12px rgba(44,58,42,.3);
    margin-bottom: 18px;
  }
  .name-plate h1{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(26px, 5vw, 38px);
    margin: 0;
    color: var(--ink);
  }
  .name-plate .sub{
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: .5px;
  }

  /* 模拟语对话泡泡 */
  .bubble{
    position: relative;
    max-width: 380px;
    margin: 20px auto 0;
    background: var(--panel);
    border-radius: 20px;
    padding: 16px 22px;
    box-shadow: 0 10px 22px -12px rgba(44,58,42,.3);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 17px;
    color: var(--teal);
  }
  .bubble::after{
    content:"";
    position:absolute;
    left: 50%;
    bottom: -10px;
    transform: translateX(-50%);
    border-width: 10px 8px 0;
    border-style: solid;
    border-color: var(--panel) transparent transparent;
  }
  .bubble .translation{
    display:block;
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  .scroll-hint{
    margin-top: 44px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .scroll-hint span{ display:inline-block; animation: bob 1.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(6px);} }

  /* ================= SECTION TITLES ================= */
  section{ padding: 46px 0; }
  .section-title{ display:flex; align-items:center; gap: 12px; margin-bottom: 26px; }
  .section-title .plumbob-mini{
    width: 16px; height:16px;
    background: linear-gradient(135deg, #8bff6e, var(--plumbob-deep));
    transform: rotate(45deg);
    border-radius: 3px;
    flex-shrink:0;
  }
  .section-title h2{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 23px;
    margin:0;
    color: var(--ink);
  }

  .card{
    background: var(--panel);
    border-radius: 20px;
    box-shadow: 0 10px 24px -14px rgba(44,58,42,.3);
    padding: 26px 26px;
  }

  /* ================= ABOUT ================= */
  .about-card p{ margin: 0 0 12px; font-size: 15.5px; }
  .about-card p:last-child{ margin-bottom:0; }
  .trait-row{ display:flex; flex-wrap:wrap; gap: 10px; margin-top: 18px; }
  .trait{
    display:inline-flex; align-items:center; gap:6px;
    background: var(--bg-2);
    border-radius: 999px;
    padding: 7px 14px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
  }

  /* ================= NEEDS 需求条 ================= */
  .needs-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 18px 28px; }
  .need{ display:flex; align-items:center; gap: 12px; }
  .need .icon{
    width: 34px; height:34px; border-radius:50%;
    background: var(--bg-2);
    display:flex; align-items:center; justify-content:center;
    font-size: 17px; flex-shrink:0;
  }
  .need .info{ flex:1; }
  .need .label{ display:flex; justify-content:space-between; font-size:13px; color:var(--ink-soft); margin-bottom:4px; font-family: var(--font-display); font-weight:600;}
  .need .track{ height: 10px; background: var(--bg-2); border-radius: 999px; overflow:hidden; }
  .need .fill{ height:100%; width:0%; border-radius:999px; transition: width 1.3s cubic-bezier(.2,.8,.2,1); }

  /* ================= SKILLS 技能圆环 ================= */
  .skill-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
    gap: 22px;
    text-align:center;
  }
  .skill{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .skill svg{ transform: rotate(-90deg); }
  .skill .ring-bg{ fill:none; stroke: var(--bg-2); stroke-width:8; }
  .skill .ring-fill{ fill:none; stroke-width:8; stroke-linecap:round; transition: stroke-dashoffset 1.4s cubic-bezier(.2,.8,.2,1); }
  .skill .emoji{ font-size: 22px; }
  .skill .lvl{ font-family: var(--font-display); font-weight:700; font-size: 13px; }
  .skill .name{ font-size: 12px; color: var(--ink-soft); }
  .skill-wrap{ position:relative; width:84px; height:84px; display:flex; align-items:center; justify-content:center; }
  .skill-center{ position:absolute; display:flex; flex-direction:column; align-items:center; }

  /* ================= ASPIRATIONS 人生愿望 ================= */
  .aspiration-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 22px;
  }
  .aspiration-card{
    background: var(--panel);
    border-radius: 18px;
    box-shadow: 0 10px 22px -14px rgba(44,58,42,.3);
    padding: 20px;
    text-decoration:none;
    color: var(--ink);
    display:block;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .aspiration-card:hover{ transform: translateY(-6px); box-shadow: 0 16px 28px -14px rgba(44,58,42,.4); }
  .aspiration-card .badge{
    display:inline-block;
    font-family: var(--font-display);
    font-weight:700;
    font-size: 11px;
    color:#fff;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .aspiration-card .icon-block{
    height: 76px; border-radius: 12px;
    background: var(--bg-2);
    display:flex; align-items:center; justify-content:center;
    font-size: 34px; margin-bottom: 12px; overflow:hidden;
  }
  .aspiration-card .icon-block img{ width:100%; height:100%; object-fit:cover; }
  .aspiration-card h3{ font-family: var(--font-display); font-size:17px; margin:0 0 6px; }
  .aspiration-card p{ font-size:13px; color:var(--ink-soft); margin:0 0 10px; }
  .aspiration-card .progress{ height:8px; background:var(--bg-2); border-radius:999px; overflow:hidden; }
  .aspiration-card .progress-fill{ height:100%; border-radius:999px; }

  /* ================= 人际关系 ================= */
  .relation-grid{ display:flex; flex-wrap:wrap; gap: 18px; }
  .relation{
    width: 168px;
    background: var(--panel);
    border-radius: 18px;
    box-shadow: 0 10px 20px -14px rgba(44,58,42,.3);
    padding: 18px;
    text-align:center;
    text-decoration:none;
    color: var(--ink);
    transition: transform .18s ease;
  }
  .relation:hover{ transform: translateY(-6px); }
  .relation .emoji{ font-size: 28px; margin-bottom: 8px; }
  .relation .label{ font-family: var(--font-display); font-weight:600; font-size:14px; margin-bottom:8px; }
  .relation .hearts{ display:flex; justify-content:center; gap:3px; font-size:12px; color: var(--coral); }

  /* ================= FOOTER ================= */
  footer{ text-align:center; padding: 46px 20px 70px; color: var(--ink-soft); font-size:13px; }
  .simlish-btn{
    margin-top: 14px;
    font-family: var(--font-display);
    font-weight:600;
    font-size: 14px;
    background: var(--plumbob);
    color: #fff;
    border:none;
    padding: 12px 24px;
    border-radius: 999px;
    cursor:pointer;
    box-shadow: 0 10px 18px -8px rgba(95,196,77,.6);
    transition: transform .15s ease;
  }
  .simlish-btn:hover{ transform: translateY(-3px); }
  .simlish-out{ margin-top:14px; font-family: var(--font-display); font-weight:600; color:var(--teal); min-height:20px; }

  @media (max-width: 640px){
    .hero{ padding: 70px 16px 30px; }
    .needs-grid{ grid-template-columns: 1fr; }
    section{ padding: 34px 0; }
  }

  :focus-visible{ outline: 3px solid var(--blue); outline-offset: 3px; }
</style>
</head>
<body>

<div class="clouds" id="clouds" aria-hidden="true"></div>

<main>
  <!-- ================= HERO ================= -->
  <section class="hero">
    <div class="plumbob-wrap"><div class="plumbob"></div></div>

    <div class="avatar-ring">
      <div class="inner" id="avatarPlaceholder">🐸</div>
      <!-- 如果有自己的照片,把上面这行换成:
           <img src="你的图片路径.jpg" alt="头像" /> -->
    </div>

    <div class="name-plate">
      <h1 id="siteName">Bobo</h1>
      <div class="sub" id="householdName">household · 我的小家</div>
    </div>

    <div class="bubble">
      <span id="simlish"></span>
      <span class="translation" id="simlishTranslation"></span>
    </div>

    <div class="scroll-hint">↓ 往下看看我的人生模拟 <span>⌄</span></div>
  </section>

  <div class="wrap">
    <!-- ================= ABOUT / TRAITS ================= -->
    <section id="about">
      <div class="section-title"><span class="plumbob-mini"></span><h2>人物简介</h2></div>
      <div class="card about-card">
        <p id="aboutText1"></p>
        <p id="aboutText2"></p>
        <div class="trait-row" id="traitRow"></div>
      </div>
    </section>

    <!-- ================= NEEDS ================= -->
    <section id="needs">
      <div class="section-title"><span class="plumbob-mini"></span><h2>状态需求</h2></div>
      <div class="card">
        <div class="needs-grid" id="needsGrid"></div>
      </div>
    </section>

    <!-- ================= SKILLS ================= -->
    <section id="skills">
      <div class="section-title"><span class="plumbob-mini"></span><h2>技能等级</h2></div>
      <div class="card">
        <div class="skill-grid" id="skillGrid"></div>
      </div>
    </section>

    <!-- ================= ASPIRATIONS / PROJECTS ================= -->
    <section id="projects">
      <div class="section-title"><span class="plumbob-mini"></span><h2>人生愿望</h2></div>
      <div class="aspiration-grid" id="aspirationGrid"></div>
    </section>

    <!-- ================= RELATIONSHIPS / CONTACT ================= -->
    <section id="contact">
      <div class="section-title"><span class="plumbob-mini"></span><h2>人际关系</h2></div>
      <div class="relation-grid" id="relationGrid"></div>
    </section>
  </div>

  <footer>
    <div>Made with 💚 &amp; 一点点 Simlish</div>
    <button class="simlish-btn" id="simlishBtn">和我说句模拟语</button>
    <div class="simlish-out" id="simlishOut"></div>
  </footer>
</main>

      { emoji: "🍳", name: "烹饪", level: 4, color: "gold" },
      { emoji: "💻", name: "编程", level: 2, color: "blue" }

      { emoji: "🐙", label: "GitHub", hearts: 5, link: "https://github.com/heyubobo" },
      { emoji: "📮", label: "邮箱", hearts: 4, link: "mailto:heyubobo@gmail.com" },

      { emoji: "📸", label: "小红书", hearts: 4, link: "https://www.xiaohongshu.com/user/profile/5747f6244775a725289a7755" }

<script>
(function(){
  const skillColors = {
    coral: "#ff8a65", purple: "#a37bff", gold: "#ffc94d", blue: "#4d9bff", teal: "#2fb3ad", plumbob: "#5fc44d"
  };
  function needColor(v){
    if (v >= 60) return getComputedStyle(document.documentElement).getPropertyValue('--need-good');
    if (v >= 30) return getComputedStyle(document.documentElement).getPropertyValue('--need-mid');
    return getComputedStyle(document.documentElement).getPropertyValue('--need-low');
  }

  document.getElementById('siteName').textContent = CONFIG.name;
  document.title = CONFIG.name + " ｜ 我的模拟人生";
  document.getElementById('householdName').textContent = CONFIG.householdName || '';
  document.getElementById('aboutText1').textContent = CONFIG.aboutText[0] || '';
  document.getElementById('aboutText2').textContent = CONFIG.aboutText[1] || '';
  document.getElementById('simlish').textContent = CONFIG.simlishGreeting || 'Sul sul!';
  document.getElementById('simlishTranslation').textContent = CONFIG.simlishGreetingTranslation || '';

  if (CONFIG.avatarImage) {
    const ph = document.getElementById('avatarPlaceholder');
    ph.outerHTML = '<img src="' + CONFIG.avatarImage + '" alt="头像" />';
  } else {
    document.getElementById('avatarPlaceholder').textContent = CONFIG.avatarEmoji || '🐸';
  }

  // ---- 特质 ----
  const traitRow = document.getElementById('traitRow');
  (CONFIG.traits || []).forEach(t => {
    const el = document.createElement('span');
    el.className = 'trait';
    el.textContent = t;
    traitRow.appendChild(el);
  });

  // ---- 需求条 ----
  const needsGrid = document.getElementById('needsGrid');
  (CONFIG.needs || []).forEach(n => {
    const row = document.createElement('div');
    row.className = 'need';
    row.innerHTML = `
      <span class="icon">${n.icon}</span>
      <span class="info">
        <span class="label"><span>${n.label}</span><span>${n.value}%</span></span>
        <span class="track"><span class="fill" style="background:${needColor(n.value)}"></span></span>
      </span>
    `;
    needsGrid.appendChild(row);
    requestAnimationFrame(() => {
      setTimeout(() => { row.querySelector('.fill').style.width = n.value + '%'; }, 150);
    });
  });

  // ---- 技能圆环 ----
  const skillGrid = document.getElementById('skillGrid');
  const R = 34, C = 2 * Math.PI * R;
  (CONFIG.skills || []).forEach(s => {
    const pct = Math.max(0, Math.min(10, s.level)) / 10;
    const color = skillColors[s.color] || skillColors.plumbob;
    const wrap = document.createElement('div');
    wrap.className = 'skill';
    wrap.innerHTML = `
      <div class="skill-wrap">
        <svg width="84" height="84" viewBox="0 0 84 84">
          <circle class="ring-bg" cx="42" cy="42" r="${R}"></circle>
          <circle class="ring-fill" cx="42" cy="42" r="${R}" stroke="${color}"
            stroke-dasharray="${C}" stroke-dashoffset="${C}"></circle>
        </svg>
        <div class="skill-center">
          <div class="emoji">${s.emoji}</div>
          <div class="lvl">Lv.${s.level}</div>
        </div>
      </div>
      <div class="name">${s.name}</div>
    `;
    skillGrid.appendChild(wrap);
    const ring = wrap.querySelector('.ring-fill');
    requestAnimationFrame(() => {
      setTimeout(() => { ring.style.strokeDashoffset = C - C * pct; }, 200);
    });
  });

  // ---- 人生愿望卡片 ----
  const badgeColors = ["#5fc44d", "#2fb3ad", "#ff8a65", "#a37bff", "#4d9bff"];
  const aspGrid = document.getElementById('aspirationGrid');
  (CONFIG.aspirations || []).forEach((p, i) => {
    const a = document.createElement('a');
    a.className = 'aspiration-card';
    a.href = p.link || '#';
    const color = badgeColors[i % badgeColors.length];
    a.innerHTML = `
      <span class="badge" style="background:${color}">ASPIRATION</span>
      <div class="icon-block">${p.image ? `<img src="${p.image}" alt="${p.title}">` : p.emoji}</div>
      <h3>${p.title}</h3>
      <p>${p.desc || ''}</p>
      <div class="progress"><div class="progress-fill" style="width:0%;background:${color}" data-target="${p.progress||0}"></div></div>
    `;
    aspGrid.appendChild(a);
    const fill = a.querySelector('.progress-fill');
    requestAnimationFrame(() => {
      setTimeout(() => { fill.style.width = (p.progress||0) + '%'; }, 250);
    });
  });

  // ---- 人际关系 ----
  const relationGrid = document.getElementById('relationGrid');
  (CONFIG.relations || []).forEach(r => {
    const a = document.createElement('a');
    a.className = 'relation';
    a.href = r.link || '#';
    a.target = r.link && r.link.startsWith('http') ? '_blank' : '_self';
    a.rel = 'noopener';
    const heartCount = Math.max(0, Math.min(5, r.hearts || 0));
    a.innerHTML = `
      <div class="emoji">${r.emoji}</div>
      <div class="label">${r.label}</div>
      <div class="hearts">${'❤'.repeat(heartCount)}${'♡'.repeat(5-heartCount)}</div>
    `;
    relationGrid.appendChild(a);
  });

  // ---- 云朵背景 ----
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!prefersReduced) {
    const clouds = document.getElementById('clouds');
    const icons = ['☁️','✨','🌿'];
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('span');
      s.textContent = icons[i % icons.length];
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 90 + '%';
      s.style.fontSize = (20 + Math.random()*16) + 'px';
      s.style.animationDuration = (5 + Math.random()*6) + 's';
      s.style.animationDirection = i % 2 ? 'alternate' : 'alternate-reverse';
      clouds.appendChild(s);
    }
  }

  // ---- 模拟语按钮 ----
  const simlishWords = ["Sul sul","Dag dag","Bloo","Wanoo","Meeshka","Grovlin","Chumbahli","Nooboo","Plumbob","Yibbi","Habibi","Fasnacht"];
  document.getElementById('simlishBtn').addEventListener('click', function(){
    const len = 3 + Math.floor(Math.random()*3);
    let phrase = [];
    for (let i=0;i<len;i++){ phrase.push(simlishWords[Math.floor(Math.random()*simlishWords.length)]); }
    document.getElementById('simlishOut').textContent = phrase.join(' ') + ' ~';
  });
})();
</script>

</body>
</html>
