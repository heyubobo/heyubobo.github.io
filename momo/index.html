<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Momo</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <div class="chat-container">

        <!-- 顶部 -->
        <div class="chat-header">
            <h1>Momo</h1>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-box"></div>

        <!-- 输入区域 -->
        <form
            id="chat-form"
            class="input-area"
        >

            <input
                type="text"
                id="message-input"
                placeholder="Type something..."
                autocomplete="off"
            >

            <button type="submit">
                Send
            </button>

        </form>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
